<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Failmate // Terminal Access</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
  <header class="fixed top-0 z-50 flex justify-between items-center w-full px-4 md:px-margin-desktop h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30">
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/logo.svg" alt="Failmate" class="h-9 w-9" />
      <span class="text-headline-md font-headline-md font-black tracking-tighter text-primary-container uppercase hidden sm:inline">Failmate</span>
    </a>
    <a href="index.html" class="text-label-caps text-on-surface-variant hover:text-primary transition-colors">← GRAVEYARD</a>
  </header>

  <main class="flex-grow flex items-center justify-center pt-16 pb-8 px-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 mb-4">
          <span class="h-2 w-2 rounded-full bg-primary-container animate-pulse"></span>
          <span class="text-label-caps text-primary/60 tracking-widest">SECURE_TERMINAL_ACCESS</span>
        </div>
        <h1 class="text-headline-lg font-data-lg text-primary uppercase">
          AUTH_GATE<span class="w-3 h-8 bg-primary ml-1 cursor-blink inline-block align-middle"></span>
        </h1>
        <p class="text-data-sm text-on-surface-variant mt-2">Sign in to bury projects, claim revivals, and earn karma.</p>
      </div>

      <div id="firebase-warning" class="hidden glass-panel border-l-4 border-error p-4 mb-6 text-data-sm text-on-surface-variant">
        <p class="text-error font-label-caps mb-2">FIREBASE NOT CONFIGURED</p>
        <p>Paste your Firebase config into <code class="text-primary">js/firebase-config.js</code>. See <code class="text-primary">FIREBASE_SETUP.md</code> for steps.</p>
      </div>

      <div class="glass-panel p-8 border border-outline-variant/30">
        <div class="flex gap-2 mb-6">
          <button type="button" id="tab-login" class="flex-1 py-2 text-label-caps border-b-2 border-primary text-primary font-bold">LOGIN</button>
          <button type="button" id="tab-signup" class="flex-1 py-2 text-label-caps border-b-2 border-transparent text-on-surface-variant hover:text-primary">REGISTER</button>
        </div>

        <form id="login-form" class="space-y-4">
          <div>
            <label class="text-label-caps text-on-surface-variant/60 text-[10px]">EMAIL_ADDRESS</label>
            <input required type="email" id="login-email" autocomplete="email" class="w-full mt-1 bg-surface-container-lowest border border-outline-variant/30 px-4 py-3 text-data-sm focus:border-primary-container focus:ring-0" placeholder="operator@failmate.io" />
          </div>
          <div>
            <label class="text-label-caps text-on-surface-variant/60 text-[10px]">ACCESS_KEY</label>
            <input required type="password" id="login-password" autocomplete="current-password" class="w-full mt-1 bg-surface-container-lowest border border-outline-variant/30 px-4 py-3 text-data-sm focus:border-primary-container focus:ring-0" placeholder="••••••••" />
          </div>
          <button type="submit" id="btn-login" class="w-full py-4 bg-primary-container text-on-primary-container font-label-caps uppercase tracking-widest hover:brightness-110 shadow-[0_0_20px_rgba(0,255,65,0.2)] transition-all">
            INITIATE_LOGIN
          </button>
        </form>

        <form id="signup-form" class="space-y-4 hidden">
          <div>
            <label class="text-label-caps text-on-surface-variant/60 text-[10px]">OPERATOR_ID</label>
            <input required type="text" id="signup-username" autocomplete="username" class="w-full mt-1 bg-surface-container-lowest border border-outline-variant/30 px-4 py-3 text-data-sm focus:border-primary-container focus:ring-0" placeholder="VOID_POINTER" />
          </div>
          <div>
            <label class="text-label-caps text-on-surface-variant/60 text-[10px]">EMAIL_ADDRESS</label>
            <input required type="email" id="signup-email" autocomplete="email" class="w-full mt-1 bg-surface-container-lowest border border-outline-variant/30 px-4 py-3 text-data-sm focus:border-primary-container focus:ring-0" />
          </div>
          <div>
            <label class="text-label-caps text-on-surface-variant/60 text-[10px]">ACCESS_KEY</label>
            <input required type="password" id="signup-password" autocomplete="new-password" minlength="6" class="w-full mt-1 bg-surface-container-lowest border border-outline-variant/30 px-4 py-3 text-data-sm focus:border-primary-container focus:ring-0" />
          </div>
          <button type="submit" id="btn-signup" class="w-full py-4 bg-primary-container text-on-primary-container font-label-caps uppercase tracking-widest hover:brightness-110">
            CREATE_OPERATOR
          </button>
        </form>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/30"></div></div>
          <div class="relative flex justify-center"><span class="bg-surface-container-low px-3 text-data-sm text-on-surface-variant/50">OR</span></div>
        </div>

        <button type="button" id="btn-google" class="w-full py-3 border border-outline-variant/40 text-label-caps text-on-surface-variant hover:border-primary hover:text-primary flex items-center justify-center gap-3 transition-all">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          CONTINUE_WITH_GOOGLE
        </button>

        <p id="auth-error" class="hidden mt-4 text-data-sm text-error text-center"></p>
        <p id="auth-loading" class="hidden mt-4 text-data-sm text-primary-container text-center animate-pulse">Authenticating...</p>
      </div>

      <p class="text-center text-data-sm text-on-surface-variant/40 mt-6 font-data-sm">
        root@failmate:~$ awaiting credentials<span class="terminal-cursor"></span>
      </p>
    </div>
  </main>

  <div id="toast" class="hidden fixed bottom-8 right-4 z-[100] glass-panel px-4 py-3"><p class="text-data-sm text-primary" id="toast-message"></p></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/data.js"></script>
  <script src="js/firestore-db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/login.js"></script>
</body>
</html>

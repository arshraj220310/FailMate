<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAILMATE // LEADERBOARD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="bg-background text-on-background font-body-md">
  <header class="fixed top-0 z-50 w-full h-16 flex items-center justify-between px-4 md:px-margin-desktop bg-surface/80 backdrop-blur-md border-b border-outline-variant/30">
    <a href="index.html" class="flex items-center gap-3"><img src="assets/logo.svg" class="h-9 w-9" alt="" /><span class="text-headline-md font-black text-primary-container uppercase">Failmate</span></a>
    <a href="dashboard.html" class="text-label-caps text-on-surface-variant hover:text-primary">Dashboard</a>
  </header>

  <main class="pt-24 pb-20 px-4 md:px-margin-desktop max-w-container-max mx-auto">
    <h1 class="text-headline-lg text-primary uppercase flex items-center gap-2 mb-2">
      <span class="material-symbols-outlined">leaderboard</span> KARMA_LEADERBOARD
    </h1>
    <p class="text-data-sm text-on-surface-variant mb-8">Ranked by upvotes and cemetery views.</p>
    <div class="glass-panel overflow-hidden" id="leaderboard-table"></div>
    <p class="mt-8 text-center"><a href="index.html" class="text-primary font-label-caps hover:underline">← Return to graveyard</a></p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/data.js"></script>
  <script src="js/firestore-db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/notifications-ui.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/app-init.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      FailMateApp.boot(async () => {
        const ranked = [...getState().projects].sort((a, b) => b.upvotes + b.views * 0.1 - (a.upvotes + a.views * 0.1));
      document.getElementById("leaderboard-table").innerHTML = `
        <div class="grid grid-cols-12 gap-4 p-4 border-b border-outline-variant/30 text-label-caps text-on-surface-variant/60">
          <span class="col-span-1">#</span><span class="col-span-5">CORPSE</span><span class="col-span-2">CAUSE</span><span class="col-span-2">UPVOTES</span><span class="col-span-2">VIEWS</span>
        </div>
        ${ranked.map((p, i) => `
          <a href="autopsy.html?id=${encodeURIComponent(p.id)}" data-autopsy-id="${p.id}" class="grid grid-cols-12 gap-4 p-4 border-b border-outline-variant/10 hover:bg-surface-variant/30 items-center">
            <span class="col-span-1 text-headline-md text-primary-container/40">${i + 1}</span>
            <span class="col-span-5 text-data-lg text-primary font-data-lg">${p.name}</span>
            <span class="col-span-2 text-label-caps text-error">${p.causeOfDeath}</span>
            <span class="col-span-2 text-data-sm">${p.upvotes}</span>
            <span class="col-span-2 text-data-sm text-on-surface-variant">${p.views}</span>
          </a>`).join("")}`;
      });
    });
  </script>
</body>
</html>
